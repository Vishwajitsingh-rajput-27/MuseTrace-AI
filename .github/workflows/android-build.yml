name: Android Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website:
    name: Build shadcn landing website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

  build:
    name: Test and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle testDebugUnitTest --stacktrace 2>&1 | tee android-test.log

      - name: Report unit test failure
        if: steps.unit_tests.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "### Android unit test failure"
            echo '```text'
            tail -n 160 android-test.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          detail="$(tail -n 100 android-test.log | sed -E 's/\x1B\[[0-9;]*[mK]//g' | tr '\n' ' ' | cut -c1-4000)"
          echo "::error title=Android unit tests failed::$detail"
          exit 1

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Build release APK if possible
        id: release_build
        continue-on-error: true
        run: gradle assembleRelease --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifacts/MuseTrace-AI.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/MuseTrace-AI.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/MuseTrace-AI.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuseTrace-AI.apk
          path: artifacts/MuseTrace-AI.apk
          if-no-files-found: error
