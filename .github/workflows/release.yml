name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Build release APK if possible
        id: release_build
        continue-on-error: true
        run: gradle assembleRelease --stacktrace

      - name: Prepare release APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifacts/MuseTrace-AI.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/MuseTrace-AI.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/MuseTrace-AI.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuseTrace-AI.apk
          path: artifacts/MuseTrace-AI.apk
          if-no-files-found: error

      - name: Create GitHub release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/MuseTrace-AI.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
